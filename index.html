<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="A local random word and passphrase generator.">
    <meta name="theme-color" content="#f5f5f5">
    <title>Random Word Generator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <h1>Random Word Generator</h1>
      </header>

      <section class="panel output-panel" aria-labelledby="result-heading">
        <h2 id="result-heading">Result</h2>

        <div
          id="result"
          class="result-output"
          role="textbox"
          aria-readonly="true"
          aria-label="Generated words"
          tabindex="0"
        >Loading…</div>

        <section class="compact-security" aria-labelledby="security-heading">
          <p id="security-heading">
            Passphrase security: <strong id="security-title">Calculating…</strong>
          </p>
          <div
            id="securityMeter"
            class="meter"
            role="meter"
            aria-label="Estimated passphrase security"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="0"
          >
            <span id="meterFill"></span>
          </div>
          <p id="securityDetail">Calculating possible combinations…</p>
        </section>

        <div class="actions">
          <button id="generateButton" class="button button-primary" type="button" disabled>
            Generate
          </button>
          <button
            id="copyButton"
            class="button button-secondary icon-button"
            type="button"
            aria-label="Copy result"
            title="Copy"
            disabled
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="8" y="8" width="11" height="11" rx="2"></rect>
              <path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"></path>
            </svg>
            <span id="copyLabel" class="visually-hidden">Copy</span>
          </button>
          <p id="status" class="status" role="status" aria-live="polite"></p>
          <button
            id="settingsButton"
            class="button button-secondary icon-button settings-button"
            type="button"
            aria-label="Open settings"
            title="Settings"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06-2.83 2.83-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.4 1.1V21h-4v-.09A1.7 1.7 0 0 0 8.6 19.4a1.7 1.7 0 0 0-1.88.34l-.06.06-2.83-2.83.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1 1.7 1.7 0 0 0-1.1-.4H3v-4h.09A1.7 1.7 0 0 0 4.6 8.6a1.7 1.7 0 0 0-.34-1.88l-.06-.06 2.83-2.83.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6 1.7 1.7 0 0 0 .4-1.1V3h4v.09A1.7 1.7 0 0 0 15.4 4.6a1.7 1.7 0 0 0 1.88-.34l.06-.06 2.83 2.83-.06.06A1.7 1.7 0 0 0 19.4 9a1.7 1.7 0 0 0 .6 1 1.7 1.7 0 0 0 1.1.4h.09v4h-.09a1.7 1.7 0 0 0-1.7.6Z"></path>
            </svg>
            <span class="visually-hidden">Settings</span>
          </button>
        </div>
      </section>
    </main>

    <dialog id="settingsDialog" aria-labelledby="settings-heading">
      <div class="dialog-content">
        <header class="settings-header">
          <h2 id="settings-heading">Settings</h2>
          <button
            id="closeSettingsButton"
            class="button button-secondary icon-button close-button"
            type="button"
            aria-label="Close settings"
            title="Close"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 6l12 12M18 6 6 18"></path>
            </svg>
          </button>
        </header>

        <form id="settingsForm" class="settings-grid">
          <fieldset id="wordListToggle" class="word-list-toggle" disabled>
            <legend>Word Complexity</legend>
            <div class="segmented-control">
              <label>
                <input type="radio" name="wordList" value="short" checked>
                <span>Simple</span>
              </label>
              <label>
                <input type="radio" name="wordList" value="long">
                <span>Complex</span>
              </label>
            </div>
          </fieldset>

          <label class="field" for="wordCount">
            <span>Number of Words</span>
            <input id="wordCount" name="wordCount" type="number" min="1" max="50" value="5">
          </label>

          <label class="field" for="caseStyle">
            <span>Capitalization</span>
            <select id="caseStyle" name="caseStyle">
              <option value="capitalize" selected>Capitalize</option>
              <option value="lower">lowercase</option>
              <option value="upper">UPPERCASE</option>
              <option value="random">Random per Word</option>
            </select>
          </label>

          <label class="field" for="separator">
            <span>Separator</span>
            <select id="separator" name="separator">
              <option value="none" selected>None</option>
              <option value="space">Space</option>
              <option value="hyphen">Hyphen (-)</option>
              <option value="underscore">Underscore (_)</option>
              <option value="period">Period (.)</option>
              <option value="comma">Comma (,)</option>
              <option value="newline">New line</option>
              <option value="random">Randomized</option>
              <option value="custom">Custom…</option>
            </select>
          </label>

          <label id="customSeparatorField" class="field" for="customSeparator" hidden>
            <span>Custom Separator</span>
            <input
              id="customSeparator"
              name="customSeparator"
              type="text"
              maxlength="8"
              value="/"
              autocomplete="off"
              spellcheck="false"
            >
          </label>

          <label class="field" for="minLength">
            <span>Min Word Length</span>
            <input id="minLength" name="minLength" type="number" min="3" max="5" value="3">
          </label>

          <label class="field" for="maxLength">
            <span>Max Word Length</span>
            <input id="maxLength" name="maxLength" type="number" min="3" max="5" value="5">
          </label>
        </form>

        <button id="resetButton" class="button button-secondary reset-button" type="button" disabled>
          Restore Default Settings
        </button>

        <footer class="credits">
          <p>
            Word lists:
            <a href="https://www.eff.org/dice" target="_blank" rel="noopener noreferrer">EFF Long</a>
            and
            <a
              href="https://www.eff.org/document/eff-short-wordlist-passphrases-1"
              target="_blank"
              rel="noopener noreferrer"
            >EFF Short #1</a>
          </p>
          <p>
            Made by
            <a
              href="https://github.com/unjaked/bookmark-separator"
              target="_blank"
              rel="noopener noreferrer"
            >@unjaked</a>
            on
            <a
              href="https://github.com/unjaked/bookmark-separator"
              target="_blank"
              rel="noopener noreferrer"
            >GitHub</a>
          </p>
        </footer>
      </div>
    </dialog>
  </body>
</html>
